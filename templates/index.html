<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EggGuard Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background-color: #0f172a;
    color: #f8fafc;
}

.navbar {
    background-color: #1e293b;
}

.card {
    background-color: #1e293b;
    border: none;
    border-radius: 16px;
}

.stat-number {
    font-size: 2rem;
    font-weight: 600;
}

.video-container {
    border-radius: 16px;
    overflow: hidden;
}

.history-item {
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 6px 0;
}
</style>
</head>
<body>

<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand mb-0 h5">EggGuard Pro</span>
  <span id="connectionStatus" class="badge bg-secondary">Disconnected</span>
</nav>

<div class="container-fluid py-4">
<div class="row g-4">

<!-- LEFT SIDE -->
<div class="col-lg-8">

<div class="card p-3">
<div class="video-container mb-3">
<img id="videoFeed" src="/video_feed" class="img-fluid w-100">
</div>

<div class="d-flex justify-content-between text-muted small">
<span id="fpsText">0 FPS</span>
<span id="totalText">0 inspected</span>
</div>

<div class="mt-3 d-flex flex-wrap gap-2">
<button class="btn btn-success" id="startBtn">Start</button>
<button class="btn btn-danger" id="stopBtn" disabled>Stop</button>
<button class="btn btn-outline-light" id="reconnectBtn">Reconnect</button>
<button class="btn btn-outline-warning" id="resetBtn">Reset</button>
</div>
</div>

</div>

<!-- RIGHT SIDE -->
<div class="col-lg-4">

<div class="card p-3 mb-4 text-center">
<h6 class="text-muted">Last Detection</h6>
<div id="lastStatus" class="badge bg-secondary p-2 fs-6">None</div>
</div>

<div class="card p-3 mb-4 text-center">
<h6 class="text-muted">Good Eggs</h6>
<div class="stat-number text-success" id="goodCount">0</div>
</div>

<div class="card p-3 mb-4 text-center">
<h6 class="text-muted">Cracked Eggs</h6>
<div class="stat-number text-danger" id="crackedCount">0</div>
</div>

<div class="card p-3 mb-4 text-center">
<h6 class="text-muted">Total Inspected</h6>
<div class="stat-number text-info" id="totalCount">0</div>
</div>

<div class="card p-3">
<h6 class="text-muted">Recent Detections</h6>
<div id="historyBox" style="max-height:200px; overflow-y:auto;"></div>
</div>

</div>

</div>
</div>

<script>
const $ = id => document.getElementById(id);

async function poll(){
try{
const res = await fetch('/get_stats');
const d = await res.json();

const good = d.good_eggs || 0;
const cracked = d.cracked_eggs || 0;
const total = d.total_detections || 0;
const fps = d.fps || 0;

$('goodCount').innerText = good;
$('crackedCount').innerText = cracked;
$('totalCount').innerText = total;
$('fpsText').innerText = fps + " FPS";
$('totalText').innerText = total + " inspected";

if(d.detection_history.length > 0){
const last = d.detection_history[0];
$('lastStatus').innerText = last.status.toUpperCase() + " (" + last.confidence + ")";

$('lastStatus').className =
last.status === "good"
? "badge bg-success p-2 fs-6"
: "badge bg-danger p-2 fs-6";
}

let historyHTML = "";
d.detection_history.forEach(item=>{
historyHTML += `
<div class="history-item">
<span class="${item.status==='good'?'text-success':'text-danger'} fw-semibold">
${item.status.toUpperCase()}
</span>
<span class="text-muted small"> ${item.confidence}</span>
<span class="float-end text-muted small">${item.time}</span>
</div>`;
});
$('historyBox').innerHTML = historyHTML;

$('connectionStatus').className =
d.camera_status === 'connected'
? "badge bg-success"
: "badge bg-secondary";

$('connectionStatus').innerText =
d.camera_status === 'connected'
? "Connected"
: "Disconnected";

}catch(e){}
}
setInterval(poll,800);

$('startBtn').onclick = async ()=>{
await fetch('/start_detection',{method:'POST'});
$('startBtn').disabled = true;
$('stopBtn').disabled = false;
};

$('stopBtn').onclick = async ()=>{
await fetch('/stop_detection',{method:'POST'});
$('startBtn').disabled = false;
$('stopBtn').disabled = true;
};

$('reconnectBtn').onclick = async ()=>{
await fetch('/reconnect_camera',{method:'POST'});
$('videoFeed').src = "/video_feed?" + Date.now();
};

$('resetBtn').onclick = async ()=>{
await fetch('/reset_stats',{method:'POST'});
};
</script>

</body>
</html>
